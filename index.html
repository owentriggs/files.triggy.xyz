<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing</title>
    <link rel="icon" type="image/svg+xml" href="https://files.triggy.xyz/.icons/files-favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Material Symbols Outlined -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8f9fa; color: #333; }
        .top-bar { 
            background-color: #EA4125; 
            color: white; 
            padding: 1.2rem 2rem; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .top-bar h1 { 
            font-family: 'Michroma', sans-serif; 
            margin: 0; 
            font-size: 1.4rem; 
            letter-spacing: 1px;
        }
        .container { max-width: 900px; margin: 2.5rem auto; padding: 0 1rem; }
        details { 
            background: white; 
            margin-bottom: 0.8rem; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        summary { 
            padding: 1.2rem; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            list-style: none;
        }
        summary::-webkit-details-marker { display: none; }
        .folder-icon { color: #EA4125; margin-right: 12px; font-variation-settings: 'FILL' 1; }
        
        details[open] summary { border-bottom: 1px solid #f5f5f5; background: #fafafa; }
        ul { list-style: none; padding: 0.8rem 1.2rem 1.2rem 1.2rem; margin: 0; }
        li { 
            display: flex; 
            align-items: center; 
            padding: 0.6rem 0.8rem;
            transition: background 0.2s;
            border-radius: 6px;
        }
        li:hover { background-color: #fff5f4; }
        .file-icon { 
            color: #EA4125; 
            margin-right: 12px; 
            font-size: 20px;
        }
        a { color: #444; text-decoration: none; font-size: 0.95rem; flex-grow: 1; }
        a:hover { color: #EA4125; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>File Sharing</h1>
    </div>
    <div class="container">
        
    <details>
        <summary><span class="material-symbols-outlined folder-icon">folder</span>documents</summary>
        <ul>
            
                <li>
                    <span class="material-symbols-outlined file-icon">picture_as_pdf</span>
                    <a href="https://files.triggy.xyz/documents/final-essay.pdf" target="_blank">final-essay.pdf</a>
                </li>
                <li>
                    <span class="material-symbols-outlined file-icon">picture_as_pdf</span>
                    <a href="https://files.triggy.xyz/documents/pdf-sample_0.pdf" target="_blank">pdf-sample_0.pdf</a>
                </li>
        </ul>
    </details>
    <details>
        <summary><span class="material-symbols-outlined folder-icon">folder</span>images</summary>
        <ul>
            
                <li>
                    <span class="material-symbols-outlined file-icon">image</span>
                    <a href="https://files.triggy.xyz/images/image01.jpg" target="_blank">image01.jpg</a>
                </li>
        </ul>
    </details>
    </div>
</body>
</html>
